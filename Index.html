<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search API Comparator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #7c6cff;
    --accent2: #ff6c6c;
    --accent3: #6cffc8;
    --text: #e8e8f0;
    --text-dim: #6a6a80;
    --text-mid: #a0a0b8;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Header */
  header {
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  .logo-area h1 span {
    color: var(--accent);
  }

  .logo-area p {
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .provider-count {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 4px;
  }

  /* Query bar */
  .query-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .query-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .query-input-wrap {
    flex: 1;
    position: relative;
  }

  .query-input-wrap::before {
    content: '>';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 14px 16px 14px 36px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
  }

  .run-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .run-btn:hover { background: #9080ff; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Providers grid */
  .providers-section {
    margin-bottom: 32px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .providers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .provider-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .provider-card.active { border-color: var(--accent); }
  .provider-card.active .provider-dot { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }

  .provider-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .provider-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .provider-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    flex: 1;
  }

  .provider-tag {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .provider-tag.ai { color: var(--accent3); border-color: rgba(108,255,200,0.3); }
  .provider-tag.serp { color: var(--accent); border-color: rgba(124,108,255,0.3); }

  .key-input-wrap {
    position: relative;
  }

  .key-input-wrap input {
    font-size: 12px;
    padding: 10px 40px 10px 12px;
    padding-left: 12px;
  }

  .key-input-wrap input::before { display: none; }

  .key-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    padding: 4px;
    font-family: var(--font-mono);
  }

  .key-toggle:hover { color: var(--text); }

  .provider-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Results */
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-query {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
  }

  .results-query span { color: var(--accent); }

  .results-stats {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 20px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
    display: flex;
    flex-direction: column;
  }

  .result-card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .result-provider-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-status {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .result-status.ok { background: rgba(108,255,200,0.1); color: var(--accent3); border: 1px solid rgba(108,255,200,0.2); }
  .result-status.err { background: rgba(255,108,108,0.1); color: var(--accent2); border: 1px solid rgba(255,108,108,0.2); }
  .result-status.loading { background: rgba(124,108,255,0.1); color: var(--accent); border: 1px solid rgba(124,108,255,0.2); }

  .result-timing {
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  .timing-fast { color: var(--accent3); }
  .timing-mid { color: #ffcc6c; }
  .timing-slow { color: var(--accent2); }

  .result-items {
    padding: 12px 16px;
    flex: 1;
    overflow: hidden;
  }

  .result-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(42,42,56,0.6);
  }

  .result-item:last-child { border-bottom: none; }

  .result-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .result-item-url {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
    opacity: 0.7;
  }

  .result-item-snippet {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .result-error {
    padding: 16px;
    color: var(--accent2);
    font-size: 12px;
    line-height: 1.6;
    background: rgba(255,108,108,0.05);
  }

  .result-count {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .no-key-msg {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.8;
  }

  .no-key-msg a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Spinner */
  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(124,108,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pulse loading card */
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  .loading-shimmer {
    animation: pulse 1.2s ease-in-out infinite;
  }

  /* Comparison summary bar */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .summary-item {
    font-size: 12px;
  }

  .summary-item .label { color: var(--text-dim); margin-bottom: 2px; }
  .summary-item .value { font-weight: 600; font-family: var(--font-display); font-size: 15px; }
  .summary-item .value.green { color: var(--accent3); }
  .summary-item .value.purple { color: var(--accent); }

  /* Responsive */
  @media (max-width: 600px) {
    .query-row { flex-direction: column; }
    .run-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-area">
      <h1>Search <span>API</span> Comparator</h1>
      <p>Run a query across multiple providers simultaneously — compare results, speed & quality</p>
    </div>
    <div class="provider-count">7 Providers</div>
  </header>

  <!-- Query Section -->
  <div class="query-section">
    <div class="section-label">Query</div>
    <div class="query-row">
      <div class="query-input-wrap">
        <input type="text" id="queryInput" placeholder="Enter a search query..." value="best AI tools for entrepreneurs 2025" />
      </div>
      <button class="run-btn" id="runBtn" onclick="runAllSearches()">Run All</button>
    </div>
  </div>

  <!-- Providers -->
  <div class="providers-section">
    <div class="section-label">API Keys — Providers</div>
    <div class="providers-grid" id="providersGrid"></div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <div class="results-query">Results for: <span id="resultsQueryLabel"></span></div>
      <div class="results-stats">
        <span id="statsCompleted">0/0 completed</span>
        <span id="statsFastest">—</span>
      </div>
    </div>
    <div class="summary-bar" id="summaryBar" style="display:none">
      <div class="summary-item">
        <div class="label">Fastest</div>
        <div class="value green" id="fastestProvider">—</div>
      </div>
      <div class="summary-item">
        <div class="label">Most Results</div>
        <div class="value purple" id="mostResults">—</div>
      </div>
      <div class="summary-item">
        <div class="label">Avg Latency</div>
        <div class="value" id="avgLatency">—</div>
      </div>
      <div class="summary-item">
        <div class="label">Success Rate</div>
        <div class="value green" id="successRate">—</div>
      </div>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

</div>

<script>
const PROVIDERS = [
  {
    id: 'serpapi',
    name: 'SerpAPI',
    tag: 'SERP',
    tagClass: 'serp',
    docsUrl: 'https://serpapi.com',
    pricePer1k: '$5.50',
    freeTier: '100/mo',
    async fetch(key, query) {
      const url = `https://serpapi.com/search.json?engine=google&q=${encodeURIComponent(query)}&api_key=${key}&num=10`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return (data.organic_results || []).map(r => ({
        title: r.title,
        url: r.link,
        snippet: r.snippet
      }));
    }
  },
  {
    id: 'serper',
    name: 'Serper.dev',
    tag: 'SERP',
    tagClass: 'serp',
    docsUrl: 'https://serper.dev',
    pricePer1k: '$1.00',
    freeTier: '2,500 free',
    async fetch(key, query) {
      const res = await fetch('https://google.serper.dev/search', {
        method: 'POST',
        headers: { 'X-API-KEY': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query, num: 10 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Request failed');
      return (data.organic || []).map(r => ({
        title: r.title,
        url: r.link,
        snippet: r.snippet
      }));
    }
  },
  {
    id: 'dataforseo',
    name: 'DataForSEO',
    tag: 'SERP',
    tagClass: 'serp',
    docsUrl: 'https://dataforseo.com',
    pricePer1k: '$0.06',
    freeTier: '$1 credit',
    keyPlaceholder: 'login:password (base64)',
    async fetch(key, query) {
      // key format: "login:password"
      const encoded = btoa(key);
      const res = await fetch('https://api.dataforseo.com/v3/serp/google/organic/live/advanced', {
        method: 'POST',
        headers: { 'Authorization': `Basic ${encoded}`, 'Content-Type': 'application/json' },
        body: JSON.stringify([{ keyword: query, language_code: 'en', location_code: 2840, depth: 10 }])
      });
      const data = await res.json();
      if (data.status_code !== 20000) throw new Error(data.status_message || 'Request failed');
      const items = data.tasks?.[0]?.result?.[0]?.items || [];
      return items.filter(i => i.type === 'organic').map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.description
      }));
    }
  },
  {
    id: 'valueserp',
    name: 'ValueSERP',
    tag: 'SERP',
    tagClass: 'serp',
    docsUrl: 'https://www.valueserp.com',
    pricePer1k: '$1.50',
    freeTier: '100 free',
    async fetch(key, query) {
      const url = `https://api.valueserp.com/search?api_key=${key}&q=${encodeURIComponent(query)}&num=10`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return (data.organic_results || []).map(r => ({
        title: r.title,
        url: r.link,
        snippet: r.snippet
      }));
    }
  },
  {
    id: 'tavily',
    name: 'Tavily',
    tag: 'AI',
    tagClass: 'ai',
    docsUrl: 'https://tavily.com',
    pricePer1k: '$4.00',
    freeTier: '1,000/mo free',
    async fetch(key, query) {
      const res = await fetch('https://api.tavily.com/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: key, query, search_depth: 'basic', max_results: 10 })
      });
      const data = await res.json();
      if (data.detail || data.error) throw new Error(data.detail || data.error);
      return (data.results || []).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.content
      }));
    }
  },
  {
    id: 'exa',
    name: 'Exa',
    tag: 'AI',
    tagClass: 'ai',
    docsUrl: 'https://exa.ai',
    pricePer1k: '$5.00',
    freeTier: '$10 credit',
    async fetch(key, query) {
      const res = await fetch('https://api.exa.ai/search', {
        method: 'POST',
        headers: { 'x-api-key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, numResults: 10, useAutoprompt: true, type: 'auto' })
      });
      const data = await res.json();
      if (data.error || data.message) throw new Error(data.error || data.message);
      return (data.results || []).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.highlights?.[0] || r.text?.slice(0, 200) || ''
      }));
    }
  },
  {
    id: 'brave',
    name: 'Brave Search',
    tag: 'AI',
    tagClass: 'ai',
    docsUrl: 'https://brave.com/search/api/',
    pricePer1k: '$3.00',
    freeTier: '2,000/mo free',
    async fetch(key, query) {
      const url = `https://api.search.brave.com/res/v1/web/search?q=${encodeURIComponent(query)}&count=10`;
      const res = await fetch(url, {
        headers: { 'Accept': 'application/json', 'Accept-Encoding': 'gzip', 'X-Subscription-Token': key }
      });
      const data = await res.json();
      if (data.type === 'ErrorResponse') throw new Error(data.message || 'Request failed');
      return (data.web?.results || []).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.description
      }));
    }
  }
];

// State
let apiKeys = {};
let results = {};
let timings = {};
let completedCount = 0;
let totalActive = 0;

// Init
function initProviders() {
  const grid = document.getElementById('providersGrid');
  grid.innerHTML = '';

  PROVIDERS.forEach(p => {
    apiKeys[p.id] = localStorage.getItem(`apikey_${p.id}`) || '';
    const card = document.createElement('div');
    card.className = 'provider-card' + (apiKeys[p.id] ? ' active' : '');
    card.id = `card_${p.id}`;
    card.innerHTML = `
      <div class="provider-header">
        <div class="provider-dot" id="dot_${p.id}"></div>
        <div class="provider-name">${p.name}</div>
        <div class="provider-tag ${p.tagClass}">${p.tag}</div>
      </div>
      <div class="key-input-wrap">
        <input type="password" id="key_${p.id}" placeholder="${p.keyPlaceholder || 'API Key'}"
          value="${apiKeys[p.id]}"
          oninput="updateKey('${p.id}', this.value)"
          style="padding-left:12px; font-size:12px;"
        />
        <button class="key-toggle" onclick="toggleKeyVisibility('${p.id}')">show</button>
      </div>
      <div class="provider-meta">
        <span>~${p.pricePer1k}/1k queries</span>
        <a href="${p.docsUrl}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:11px;">docs ↗</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

function updateKey(id, val) {
  apiKeys[id] = val;
  localStorage.setItem(`apikey_${id}`, val);
  const card = document.getElementById(`card_${id}`);
  card.classList.toggle('active', !!val);
}

function toggleKeyVisibility(id) {
  const input = document.getElementById(`key_${id}`);
  const btn = input.nextElementSibling;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'hide';
  } else {
    input.type = 'password';
    btn.textContent = 'show';
  }
}

function getTimingClass(ms) {
  if (ms < 800) return 'timing-fast';
  if (ms < 2000) return 'timing-mid';
  return 'timing-slow';
}

function renderResultCard(provider, state) {
  // state: 'loading' | { results, timing } | { error, timing }
  const card = document.getElementById(`result_${provider.id}`) || (() => {
    const el = document.createElement('div');
    el.className = 'result-card';
    el.id = `result_${provider.id}`;
    document.getElementById('resultsGrid').appendChild(el);
    return el;
  })();

  if (state === 'loading') {
    card.innerHTML = `
      <div class="result-card-header">
        <div class="result-provider-name">${provider.name} <span class="provider-tag ${provider.tagClass}">${provider.tag}</span></div>
        <div class="result-status loading"><span class="spinner"></span></div>
      </div>
      <div class="result-items loading-shimmer" style="padding:24px 16px;color:var(--text-dim);font-size:12px;">Fetching results...</div>
    `;
    return;
  }

  if (state.error) {
    card.innerHTML = `
      <div class="result-card-header">
        <div class="result-provider-name">${provider.name} <span class="provider-tag ${provider.tagClass}">${provider.tag}</span></div>
        <div class="result-status err">Error</div>
      </div>
      <div class="result-timing">
        <span class="${getTimingClass(state.timing)}">${state.timing}ms</span>
      </div>
      <div class="result-error">⚠ ${state.error}</div>
    `;
    return;
  }

  const items = state.results.slice(0, 8);
  card.innerHTML = `
    <div class="result-card-header">
      <div class="result-provider-name">${provider.name} <span class="provider-tag ${provider.tagClass}">${provider.tag}</span></div>
      <div class="result-status ok">OK</div>
    </div>
    <div class="result-timing">
      <span class="${getTimingClass(state.timing)}">${state.timing}ms</span>
      <span style="color:var(--text-dim)">${items.length} results shown</span>
    </div>
    <div class="result-items">
      ${items.map(r => `
        <div class="result-item">
          <div class="result-item-title">${escHtml(r.title || '—')}</div>
          <div class="result-item-url">${escHtml(r.url || '')}</div>
          <div class="result-item-snippet">${escHtml(r.snippet || '')}</div>
        </div>
      `).join('')}
    </div>
    <div class="result-count">
      <span>${state.results.length} total results</span>
      <span style="color:var(--text-dim);font-size:10px;">${provider.pricePer1k}/1k</span>
    </div>
  `;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateSummary() {
  const done = Object.entries(results).filter(([, v]) => v && !v.loading);
  if (done.length === 0) return;

  const successes = done.filter(([, v]) => !v.error);
  const errors = done.filter(([, v]) => v.error);

  // Fastest
  let fastest = null, fastestMs = Infinity;
  successes.forEach(([id, v]) => {
    if (v.timing < fastestMs) { fastestMs = v.timing; fastest = id; }
  });

  // Most results
  let mostId = null, mostCount = 0;
  successes.forEach(([id, v]) => {
    if ((v.results?.length || 0) > mostCount) { mostCount = v.results.length; mostId = id; }
  });

  // Avg latency
  const avgMs = successes.length ? Math.round(successes.reduce((a, [, v]) => a + v.timing, 0) / successes.length) : 0;

  document.getElementById('summaryBar').style.display = 'flex';
  document.getElementById('fastestProvider').textContent = fastest ? PROVIDERS.find(p => p.id === fastest)?.name + ` (${fastestMs}ms)` : '—';
  document.getElementById('mostResults').textContent = mostId ? PROVIDERS.find(p => p.id === mostId)?.name + ` (${mostCount})` : '—';
  document.getElementById('avgLatency').textContent = avgMs ? `${avgMs}ms` : '—';
  document.getElementById('successRate').textContent = done.length ? `${successes.length}/${done.length}` : '—';

  document.getElementById('statsCompleted').textContent = `${done.length}/${totalActive} completed`;
}

async function runAllSearches() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const activeProviders = PROVIDERS.filter(p => apiKeys[p.id]);
  if (activeProviders.length === 0) {
    alert('Please enter at least one API key to run a search.');
    return;
  }

  // Reset
  results = {};
  timings = {};
  completedCount = 0;
  totalActive = activeProviders.length;

  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').textContent = 'Running…';
  document.getElementById('resultsSection').className = 'results-section visible';
  document.getElementById('resultsQueryLabel').textContent = `"${query}"`;
  document.getElementById('resultsGrid').innerHTML = '';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('statsCompleted').textContent = `0/${totalActive} completed`;
  document.getElementById('statsFastest').textContent = '—';

  // Render all loading cards first
  activeProviders.forEach(p => renderResultCard(p, 'loading'));

  // Fire all in parallel
  const promises = activeProviders.map(async (provider) => {
    const start = Date.now();
    try {
      const res = await provider.fetch(apiKeys[provider.id], query);
      const timing = Date.now() - start;
      results[provider.id] = { results: res, timing };
      renderResultCard(provider, { results: res, timing });
    } catch (err) {
      const timing = Date.now() - start;
      results[provider.id] = { error: err.message, timing };
      renderResultCard(provider, { error: err.message, timing });
    }
    completedCount++;
    updateSummary();
  });

  await Promise.allSettled(promises);

  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').textContent = 'Run All';
}

// Allow Enter key to run
document.addEventListener('DOMContentLoaded', () => {
  initProviders();
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAllSearches();
  });
});
</script>
